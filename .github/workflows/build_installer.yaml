name: Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  windows-installer:
   runs-on: windows-latest
   steps:
     - uses: actions/checkout@v5
     - uses: conda-incubator/setup-miniconda@v3
       with:
           activate-environment: rascal2
           environment-file: environment.yaml
           auto-activate-base: false
     - name: Set up MATLAB
       uses: matlab-actions/setup-matlab@v2
       with:
         release: R2023a
     - name: Make installer
       shell: powershell
       run: |
         conda init powershell
         conda activate rascal2
         conda install -c nsis nsis=3.* accesscontrol
         dir D:\hostedtoolcache\windows\MATLAB\2023.1.999\x64
         python -m pip install --no-build-isolation 'D:\hostedtoolcache\windows\MATLAB\2023.1.999\x64\extern\engines\python'
         python packaging/build_exe.py
         if ($env:GITHUB_REF_NAME -eq "main") {
           makensis /DNIGHTLY packaging/windows/build_installer.nsi
         }
         else {
           makensis packaging/windows/build_installer.nsi
         }
     - name: Upload installer
       uses: actions/upload-artifact@v4
       with:
         name: windows installer
         path: packaging/windows/*.exe
  macos-installer:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-14]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
      - uses: conda-incubator/setup-miniconda@v3
        with:
            activate-environment: rascal2
            environment-file: environment.yaml
            auto-activate-base: false
#      - name: Set up MATLAB
#        uses: matlab-actions/setup-matlab@v2
#        with:
#          release: R2023b
      - name: Make executable
        shell: bash -el {0}
        run: |
          conda init bash
          conda activate rascal2
          python packaging/build_exe.py
#          if [ ${{ matrix.platform }} == "macos-14" ]; then
#            ARCH="arm64"
#            export DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH:/Users/runner/hostedtoolcache/MATLAB/2023.2.999/arm64/MATLAB.app/bin/maca64
#            python -m pip install --no-build-isolation /Users/runner/hostedtoolcache/MATLAB/2023.2.999/arm64/MATLAB.app/extern/engines/python
#          else
#            ARCH="x64"
#            export DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH:/Users/runner/hostedtoolcache/MATLAB/2023.2.999/x64/MATLAB.app/bin/maci64
#            python -m pip install --no-build-isolation /Users/runner/hostedtoolcache/MATLAB/2023.2.999/x64/MATLAB.app/extern/engines/python
#          fi
          
#          chmod 777 packaging/bundle/rascal.app/Contents/Resources/matlab/engine/_arch.txt
      - name: Build and Sign installer
        run: |
          cd packaging/macos/
          # create variables
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          echo -n $CODE_SIGNING_CERTIFICATE_BASE64 | base64 -d -o   ./dev_id_app_certificate.p12
          security import ./dev_id_app_certificate.p12 -A -t cert -f pkcs12 -k $KEYCHAIN_PATH -P "$CODE_SIGNING_PASSWORD" -T /usr/bin/codesign
          echo -n $PKG_SIGNING_CERTIFICATE_BASE64 | base64 -d -o  ./dev_id_install_certificate.p12
          security import ./dev_id_install_certificate.p12 -A -t cert -f pkcs12 -k $KEYCHAIN_PATH -P "$PKG_SIGNING_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          ARCH="arm64"
          echo -n $API_CONNECT_KEY | base64 -d -o  ./auth_key.p8
          chmod 777 make.sh
          ./make.sh "$GITHUB_REF_NAME" "$ARCH" "$DEV_TEAM_ID" "API_CONNECT_KEY_ID" "NOTARY_ID" "NOTARY_PASSWORD"
        env:
          CODE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.CODE_SIGNING_CERTIFICATE_BASE64 }}
          CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
          PKG_SIGNING_CERTIFICATE_BASE64: ${{ secrets.PKG_SIGNING_CERTIFICATE_BASE64 }}
          PKG_SIGNING_PASSWORD: ${{ secrets.PKG_SIGNING_PASSWORD }}
          DEV_TEAM_ID: ${{ secrets.DEV_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          API_CONNECT_KEY_ID: ${{ secrets.API_CONNECT_KEY_ID }}
          API_CONNECT_KEY: ${{ secrets.API_CONNECT_KEY }}
          NOTARY_ID: ${{ secrets.NOTARY_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: macOS installer-${{ strategy.job-index }}
          path: packaging/macos/RasCAL-2*.pkg
